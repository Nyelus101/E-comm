# docker-compose.yml
# version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16   # PostgreSQL 16 with pgvector built in
    container_name: laptop_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"                 # Exposes DB on your machine at port 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Data persists between restarts

  redis:
    image: redis:7-alpine
    container_name: laptop_redis
    ports:
      - "6379:6379"                 # Redis on port 6379
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    container_name: laptop_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env              # Loads all your secrets
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app              # Live reload: code changes reflect immediately
    # command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: laptop_es
    environment:
      - discovery.type=single-node          # single node — no cluster needed for dev
      - xpack.security.enabled=false        # disable auth for local dev (enable in prod)
      - ES_JAVA_OPTS=-Xms512m -Xmx512m      # limit memory — ES is greedy by default
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 20s
      timeout: 10s
      retries: 5

  # pgadmin:
  #   image: dpage/pgadmin4
  #   container_name: laptop_pgadmin
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@admin.com
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #   ports:
  #     - "5050:80"
  #   depends_on:
  #     - db

volumes:
  postgres_data:
  redis_data:
  es_data: 